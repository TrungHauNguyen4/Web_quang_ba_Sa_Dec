name: ci

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Restore backend
        run: dotnet restore ./Sadec.Api/Sadec.Api.csproj

      - name: Build backend
        run: dotnet build ./Sadec.Api/Sadec.Api.csproj --configuration Release --no-restore

      - name: Run backend tests
        run: dotnet test ./Sadec.Api.Tests/Sadec.Api.Tests.csproj --configuration Release --no-build

      - name: Publish backend artifact
        run: dotnet publish ./Sadec.Api/Sadec.Api.csproj -c Release -o ./artifacts/backend

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-release
          path: artifacts/backend

  frontend:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend artifact
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist
